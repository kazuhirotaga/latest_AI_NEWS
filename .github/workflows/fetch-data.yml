name: Fetch latest AI Trends and News

on:
  schedule:
    # Runs at 00:00 and 12:00 UTC everyday (12-hour intervals)
    - cron: '0 */12 * * *'
  workflow_dispatch:
    # Allows manual trigger of this workflow from the GitHub Actions tab

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial permission to commit and push changes back to repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Execute data collection script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically provided token for rate limits
        run: node scripts/fetch-trends.js

      - name: Commit and push updated trends data
        run: |
          git config --global user.name "gitai-trends-bot[bot]"
          git config --global user.email "gitai-trends-bot[bot]@users.noreply.github.com"
          git add data/trends-data.json
          if git diff --staged --quiet; then
            echo "No changes in trends-data.json"
          else
            git commit -m "chore: auto-update AI trends and news data"
            git push
          fi
